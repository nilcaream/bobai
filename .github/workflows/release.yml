name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Release
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="bobai-v${NEW_VERSION}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${TAG} already exists. Releases are immutable." >&2
            exit 1
          fi

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Bump versions
        run: |
          V="${{ steps.version.outputs.version }}"
          jq --arg v "${V}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "${V}" '.version = $v' packages/server/package.json > packages/server/package.json.tmp && mv packages/server/package.json.tmp packages/server/package.json
          jq --arg v "${V}" '.version = $v' packages/ui/package.json > packages/ui/package.json.tmp && mv packages/ui/package.json.tmp packages/ui/package.json

      - name: Generate changelog
        run: |
          chmod +x scripts/generate-changelog.sh

          PREV_TAG=$(git tag --sort=-version:refname | grep '^bobai-v' | head -1)
          if [[ -z "${PREV_TAG}" ]]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Comparing ${PREV_TAG}..HEAD"

          CHANGELOG=$(scripts/generate-changelog.sh "${PREV_TAG}" HEAD)

          NEW_VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          HEADER="## [${NEW_VERSION}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}) ($(date +%Y-%m-%d))"

          if [[ -f CHANGELOG.md ]]; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "${HEADER}"
              echo ""
              echo "${CHANGELOG}"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${HEADER}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${CHANGELOG}" >> CHANGELOG.md
          fi

          echo "${CHANGELOG}" > RELEASE_NOTES.md

      - name: Build server
        run: bun build --target=bun --minify --outfile=dist/server.js packages/server/src/index.ts

      - name: Build UI
        run: cd packages/ui && bunx vite build

      - name: Package release archives
        run: |
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Commit, tag, and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add package.json packages/server/package.json packages/ui/package.json CHANGELOG.md
          git commit -m "chore: release bobai ${{ steps.version.outputs.version }}"

          git tag -a "${{ steps.version.outputs.tag }}" -m "Release bobai ${{ steps.version.outputs.version }}"

          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" release/* \
            --title "bobai ${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
