name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="bobai-v${NEW_VERSION}"

          # Update all package.json files
          jq --arg v "${NEW_VERSION}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "${NEW_VERSION}" '.version = $v' packages/server/package.json > packages/server/package.json.tmp && mv packages/server/package.json.tmp packages/server/package.json
          jq --arg v "${NEW_VERSION}" '.version = $v' packages/ui/package.json > packages/ui/package.json.tmp && mv packages/ui/package.json.tmp packages/ui/package.json

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Comparing ${PREV_TAG}..HEAD"
          CHANGELOG=$(scripts/generate-changelog.sh "${PREV_TAG}" HEAD)

          # Write release notes for the PR body
          echo "${CHANGELOG}" > RELEASE_NOTES.md

          # Prepend to CHANGELOG.md
          NEW_VERSION="${{ steps.version.outputs.version }}"
          HEADER="## [${NEW_VERSION}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...bobai-v${NEW_VERSION}) ($(date +%Y-%m-%d))"
          if [[ -f CHANGELOG.md ]]; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "${HEADER}"
              echo ""
              echo "${CHANGELOG}"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${HEADER}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${CHANGELOG}" >> CHANGELOG.md
          fi

          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/${{ steps.version.outputs.tag }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "${BRANCH}"
          git add package.json packages/server/package.json packages/ui/package.json CHANGELOG.md
          git commit -m "chore: release bobai ${{ steps.version.outputs.version }}"
          git push origin "${BRANCH}"

          gh pr create \
            --title "chore: release bobai ${{ steps.version.outputs.version }}" \
            --body-file RELEASE_NOTES.md \
            --base main \
            --head "${BRANCH}"