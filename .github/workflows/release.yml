name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT}"

          case "${{ github.event.inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="bobai-v${NEW_VERSION}"

          # Update all package.json files
          jq --arg v "${NEW_VERSION}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "${NEW_VERSION}" '.version = $v' packages/server/package.json > packages/server/package.json.tmp && mv packages/server/package.json.tmp packages/server/package.json
          jq --arg v "${NEW_VERSION}" '.version = $v' packages/ui/package.json > packages/ui/package.json.tmp && mv packages/ui/package.json.tmp packages/ui/package.json

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Comparing ${PREV_TAG}..HEAD"
          CHANGELOG=$(scripts/generate-changelog.sh "${PREV_TAG}" HEAD)

          # Write release notes for GitHub release
          echo "${CHANGELOG}" > RELEASE_NOTES.md

          # Prepend to CHANGELOG.md
          NEW_VERSION="${{ steps.version.outputs.version }}"
          HEADER="## [${NEW_VERSION}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...bobai-v${NEW_VERSION}) ($(date +%Y-%m-%d))"
          if [[ -f CHANGELOG.md ]]; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "${HEADER}"
              echo ""
              echo "${CHANGELOG}"
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.md.new && mv CHANGELOG.md.new CHANGELOG.md
          else
            echo "# Changelog" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${HEADER}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "${CHANGELOG}" >> CHANGELOG.md
          fi

          echo "prev_tag=${PREV_TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and changelog
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add package.json packages/server/package.json packages/ui/package.json CHANGELOG.md
          git commit -m "chore: release bobai ${{ steps.version.outputs.version }}"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release bobai ${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      - name: Lint — server
        run: cd packages/server && bun run check -- --error-on-warnings

      - name: Lint — UI
        run: cd packages/ui && bun run check -- --error-on-warnings

      - name: Typecheck — UI
        run: cd packages/ui && bunx tsc --noEmit

      - name: Test — server
        run: cd packages/server && bun test
        env:
          BOBAI_PLATFORM: linux-x64

      - name: Test — UI
        run: cd packages/ui && bun test

      - name: Bundle server
        run: |
          bun build --target=bun --minify \
            --outfile=dist/server.js \
            packages/server/src/index.ts

      - name: Build UI
        run: cd packages/ui && bunx vite build

      - name: Package release archives
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" release/* \
            --title "bobai ${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

      - name: Update coverage badges
        run: |
          # Re-run tests with coverage for badge update
          cd packages/server && bun test --coverage --coverage-reporter=lcov
          cd "${GITHUB_WORKSPACE}"
          cd packages/ui && bun test --coverage --coverage-reporter=lcov
          cd "${GITHUB_WORKSPACE}"

          parse_pct() {
            local lcov="${1}"
            local lf=0 lh=0
            while IFS= read -r line; do
              case "${line}" in
                LF:*)  lf=$(( lf + ${line#LF:} )) ;;
                LH:*)  lh=$(( lh + ${line#LH:} )) ;;
              esac
            done < "${lcov}"
            if [[ "${lf}" -gt 0 ]]; then
              awk "BEGIN { printf \"%.0f\", (${lh}/${lf})*100 }"
            else
              echo "0"
            fi
          }

          badge_color() {
            local pct="${1}"
            if   [[ "${pct}" -ge 90 ]]; then echo "brightgreen"
            elif [[ "${pct}" -ge 75 ]]; then echo "yellow"
            else echo "red"
            fi
          }

          SERVER_PCT=$(parse_pct packages/server/coverage/lcov.info)
          UI_PCT=$(parse_pct packages/ui/coverage/lcov.info)
          SERVER_COLOR=$(badge_color "${SERVER_PCT}")
          UI_COLOR=$(badge_color "${UI_PCT}")

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin badges
          git worktree add /tmp/badges-branch origin/badges

          cat > /tmp/badges-branch/coverage-server.json << EOF
          { "schemaVersion": 1, "label": "coverage (server)", "message": "${SERVER_PCT}%", "color": "${SERVER_COLOR}" }
          EOF

          cat > /tmp/badges-branch/coverage-ui.json << EOF
          { "schemaVersion": 1, "label": "coverage (ui)", "message": "${UI_PCT}%", "color": "${UI_COLOR}" }
          EOF

          git -C /tmp/badges-branch add coverage-server.json coverage-ui.json
          git -C /tmp/badges-branch diff --cached --quiet || \
            git -C /tmp/badges-branch commit -m "chore: update coverage badges [skip ci]"
          git -C /tmp/badges-branch push origin HEAD:badges