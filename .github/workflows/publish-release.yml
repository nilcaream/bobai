name: Publish release

on:
  push:
    branches: [main]
    paths:
      - package.json
      - packages/server/package.json
      - packages/ui/package.json

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check if this is a release merge
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Check commit message
        id: check
        run: |
          MESSAGE=$(git log -1 --format='%s')
          if echo "${MESSAGE}" | grep -qE '^chore: release bobai [0-9]+\.[0-9]+\.[0-9]+$'; then
            VERSION=$(echo "${MESSAGE}" | sed 's/chore: release bobai //')
            TAG="bobai-v${VERSION}"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Detected release: ${VERSION} (${TAG})"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "Not a release commit: ${MESSAGE}"
          fi

  publish:
    name: Build and publish
    needs: check
    if: needs.check.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint — server
        run: cd packages/server && bun run check -- --error-on-warnings

      - name: Lint — UI
        run: cd packages/ui && bun run check -- --error-on-warnings

      - name: Typecheck — UI
        run: cd packages/ui && bunx tsc --noEmit

      - name: Test — server
        run: cd packages/server && bun test
        env:
          BOBAI_PLATFORM: linux-x64

      - name: Test — UI
        run: cd packages/ui && bun test

      - name: Bundle server
        run: |
          bun build --target=bun --minify \
            --outfile=dist/server.js \
            packages/server/src/index.ts

      - name: Build UI
        run: cd packages/ui && bunx vite build

      - name: Package release archives
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${VERSION}"

      - name: Create git tag
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "${{ needs.check.outputs.tag }}" -m "Release bobai ${{ needs.check.outputs.version }}"
          git push origin "${{ needs.check.outputs.tag }}"

      - name: Generate release notes
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^bobai-v' | head -2 | tail -1)
          if [[ -z "${PREV_TAG}" ]]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Comparing ${PREV_TAG}..${{ needs.check.outputs.tag }}"
          scripts/generate-changelog.sh "${PREV_TAG}" "${{ needs.check.outputs.tag }}" > RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.check.outputs.tag }}" release/* \
            --title "bobai ${{ needs.check.outputs.version }}" \
            --notes-file RELEASE_NOTES.md

      - name: Update coverage badges
        run: |
          # Re-run tests with coverage for badge update
          cd packages/server && bun test --coverage --coverage-reporter=lcov
          cd "${GITHUB_WORKSPACE}"
          cd packages/ui && bun test --coverage --coverage-reporter=lcov
          cd "${GITHUB_WORKSPACE}"

          parse_pct() {
            local lcov="${1}"
            local lf=0 lh=0
            while IFS= read -r line; do
              case "${line}" in
                LF:*)  lf=$(( lf + ${line#LF:} )) ;;
                LH:*)  lh=$(( lh + ${line#LH:} )) ;;
              esac
            done < "${lcov}"
            if [[ "${lf}" -gt 0 ]]; then
              awk "BEGIN { printf \"%.0f\", (${lh}/${lf})*100 }"
            else
              echo "0"
            fi
          }

          badge_color() {
            local pct="${1}"
            if   [[ "${pct}" -ge 90 ]]; then echo "brightgreen"
            elif [[ "${pct}" -ge 75 ]]; then echo "yellow"
            else echo "red"
            fi
          }

          SERVER_PCT=$(parse_pct packages/server/coverage/lcov.info)
          UI_PCT=$(parse_pct packages/ui/coverage/lcov.info)
          SERVER_COLOR=$(badge_color "${SERVER_PCT}")
          UI_COLOR=$(badge_color "${UI_PCT}")

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git fetch origin badges
          git worktree add /tmp/badges-branch origin/badges

          cat > /tmp/badges-branch/coverage-server.json << EOF
          { "schemaVersion": 1, "label": "coverage (server)", "message": "${SERVER_PCT}%", "color": "${SERVER_COLOR}" }
          EOF

          cat > /tmp/badges-branch/coverage-ui.json << EOF
          { "schemaVersion": 1, "label": "coverage (ui)", "message": "${UI_PCT}%", "color": "${UI_COLOR}" }
          EOF

          git -C /tmp/badges-branch add coverage-server.json coverage-ui.json
          git -C /tmp/badges-branch diff --cached --quiet || \
            git -C /tmp/badges-branch commit -m "chore: update coverage badges [skip ci]"
          git -C /tmp/badges-branch push origin HEAD:badges