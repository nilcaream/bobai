name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint — server
        run: cd packages/server && bun run check -- --error-on-warnings

      - name: Lint — UI
        run: cd packages/ui && bun run check -- --error-on-warnings

      - name: Typecheck — UI
        run: cd packages/ui && bunx tsc --noEmit

      - name: Test — server
        run: cd packages/server && bun test --coverage --coverage-reporter=text --coverage-reporter=lcov
        env:
          BOBAI_PLATFORM: linux-x64

      - name: Test — UI
        run: cd packages/ui && bun test --coverage --coverage-reporter=text --coverage-reporter=lcov

      - name: Bundle server
        run: |
          bun build --target=bun --minify \
            --outfile=dist/server.js \
            packages/server/src/index.ts

      - name: Build UI
        run: cd packages/ui && bunx vite build

      - name: Package release archives
        run: |
          VERSION="${{ needs.release-please.outputs.tag_name }}"
          VERSION="${VERSION#bobai-v}"
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "${VERSION}"

      - name: Create release with assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.release-please.outputs.tag_name }}" release/* \
            --title "${{ needs.release-please.outputs.tag_name }}" \
            --generate-notes
