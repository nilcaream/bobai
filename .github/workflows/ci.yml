name: CI

on:
  workflow_dispatch:
  workflow_call:

jobs:
  ci:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint — server
        run: cd packages/server && bun run check -- --error-on-warnings

      - name: Lint — UI
        run: cd packages/ui && bun run check -- --error-on-warnings

      - name: Typecheck — UI
        run: cd packages/ui && bunx tsc --noEmit

      - name: Test — server
        run: cd packages/server && bun test
        env:
          BOBAI_PLATFORM: linux-x64

      - name: Test — UI
        run: cd packages/ui && bun test
